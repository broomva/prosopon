name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo check
        run: cargo check --workspace --all-targets
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets
        # v0.1: clippy warnings are allowed. Tighten to `-- -D warnings` in v0.2.

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace

  schema:
    name: Publish IR schema artifacts
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Emit schemas
        run: |
          mkdir -p schemas
          cargo run -p prosopon-cli --quiet -- schema scene > schemas/scene.schema.json
          cargo run -p prosopon-cli --quiet -- schema event > schemas/event.schema.json
      - name: Upload schemas
        uses: actions/upload-artifact@v4
        with:
          name: prosopon-schemas
          path: schemas/

  js:
    name: TS bindings (@broomva/prosopon)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run --cwd packages/prosopon-ts typecheck
      - name: Test
        run: bun run --cwd packages/prosopon-ts test
      - name: Build
        run: bun run --cwd packages/prosopon-ts build
      - name: Verify tarball shape
        run: |
          cd packages/prosopon-ts
          npm pack --dry-run

  schema-parity:
    name: TS bindings stay in sync with Rust schemas
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3
      - name: Install JS deps
        run: bun install --frozen-lockfile
      - name: Regenerate committed schema snapshots
        run: |
          cargo run -p prosopon-cli --quiet -- schema scene > packages/prosopon-ts/src/generated/scene.json
          cargo run -p prosopon-cli --quiet -- schema event > packages/prosopon-ts/src/generated/event.json
      - name: Regenerate types.ts
        run: bun run --cwd packages/prosopon-ts generate
      - name: Fail if bindings drifted from source of truth
        # The Lifecycle type has a Default impl that stamps Utc::now() for
        # `created_at`; schemars serializes that default into the schema as a
        # documentation hint, so every fresh dump has a different timestamp.
        # We normalize any ISO-8601 timestamp to a stable placeholder before
        # diffing so we only fail on real schema drift (new variants, renamed
        # fields, changed tags). Same treatment for the types.ts banner,
        # which embeds `new Date().toISOString()` at generate-time.
        run: |
          normalize() {
            sed -E \
              -e 's/"[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(\.[0-9]+)?Z"/"<TIMESTAMP>"/g' \
              -e 's/Generated on: [0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9:.Z]+/Generated on: <TIMESTAMP>/'
          }
          drift=0
          for f in \
            packages/prosopon-ts/src/generated/scene.json \
            packages/prosopon-ts/src/generated/event.json \
            packages/prosopon-ts/src/generated/types.ts
          do
            if ! diff -u \
              <(git show "HEAD:$f" | normalize) \
              <(normalize < "$f") \
              > "/tmp/diff-$(basename "$f")"
            then
              echo "::error::Drift detected in $f — regenerate locally and commit."
              cat "/tmp/diff-$(basename "$f")"
              drift=1
            fi
          done
          if [ "$drift" != "0" ]; then
            echo ""
            echo "Fix: run 'make js-generate' (or the long form documented in"
            echo "packages/prosopon-ts/README.md) and commit the result."
            exit 1
          fi
